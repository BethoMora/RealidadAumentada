<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR con Marcador Hiro</title>

  <!--
    ┌─────────────────────────────────────────────────────────┐
    │  1. LIBRERÍAS EXTERNAS                                  │
    │  A-Frame: motor de escenas 3D/VR/AR para la web.       │
    │  AR.js:   añade Realidad Aumentada a A-Frame usando    │
    │           la cámara y marcadores fiduciarios.           │
    └─────────────────────────────────────────────────────────┘
  -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    /* ── Estilos generales ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      overflow: hidden; /* La cámara ocupa toda la pantalla */
    }

    /* ── HUD: panel de instrucciones flotante ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none; /* No bloquea la cámara */
    }

    #instrucciones {
      margin: 12px auto;
      max-width: 360px;
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(120, 200, 255, 0.25);
      border-radius: 14px;
      padding: 12px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hud-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .hud-text {
      color: #c8e8ff;
      font-size: 13px;
      line-height: 1.5;
    }

    .hud-text strong {
      color: #7dd3fc;
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    /* ── Botón para cerrar el HUD ── */
    #btn-cerrar {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 1000;
      background: rgba(30, 30, 60, 0.85);
      border: 1px solid rgba(120, 200, 255, 0.3);
      border-radius: 50%;
      color: #7dd3fc;
      width: 34px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Badge "Marcador Hiro" abajo ── */
    #badge-marcador {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: none;
      background: rgba(10, 10, 20, 0.72);
      border: 1px solid rgba(120, 200, 255, 0.2);
      border-radius: 30px;
      padding: 8px 20px;
      color: #7dd3fc;
      font-size: 12px;
      letter-spacing: 0.06em;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Ocultar HUD cuando el usuario lo cierra ── */
    #hud.oculto { display: none; }
  </style>
</head>

<body>

  <!-- ────────────────────────────────────────────────
       2. HUD: instrucciones para el usuario
  ──────────────────────────────────────────────────── -->
  <div id="hud">
    <div id="instrucciones">
      <span class="hud-icon">📷</span>
      <div class="hud-text">
        <strong>Realidad Aumentada · Marcador Hiro</strong>
        Apunta tu cámara al marcador <em>Hiro</em> e imprime o muestra
        en pantalla la imagen de abajo. ¡El astronauta aparecerá encima!
      </div>
    </div>
  </div>

  <!-- Botón X para cerrar el HUD -->
  <button id="btn-cerrar" title="Cerrar instrucciones">✕</button>

  <!-- Badge inferior -->
  <div id="badge-marcador">🎯 Marcador: HIRO</div>


  <!-- ────────────────────────────────────────────────
       3. ESCENA A-FRAME CON AR.JS
       
       arjs="sourceType: webcam"   → usa la cámara del dispositivo
       vr-mode-ui="enabled: false" → oculta el botón de VR (no lo necesitamos)
       renderer="logarithmicDepthBuffer: true" → evita flickering en AR
       embedded                    → la escena se incrusta en el body (no iframe)
  ──────────────────────────────────────────────────── -->
  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    embedded
  >

    <!--
      ┌─────────────────────────────────────────────────────────┐
      │  4. ASSETS (recursos precargados)                       │
      │  Precargamos el modelo glTF del astronauta de la NASA   │
      │  que está disponible públicamente en el CDN de A-Frame. │
      └─────────────────────────────────────────────────────────┘
    -->
    <a-assets timeout="15000">
      <!--
        Modelo glTF del astronauta — asset oficial de A-Frame / Khronos Group.
        URL pública y gratuita. El id "astronauta" lo usaremos luego.
      -->
      <a-asset-item
        id="astronauta"
        src="https://cdn.aframe.io/examples/ar/models/astronaut/Astronaut.glb"
      ></a-asset-item>
    </a-assets>


    <!--
      ┌─────────────────────────────────────────────────────────┐
      │  5. CÁMARA AR                                           │
      │  A-Frame con AR.js necesita una cámara con look-controls│
      │  desactivados; AR.js la controla sola con el marcador.  │
      └─────────────────────────────────────────────────────────┘
    -->
    <a-entity camera></a-entity>


    <!--
      ┌─────────────────────────────────────────────────────────┐
      │  6. MARCADOR HIRO                                       │
      │  <a-marker> detecta el marcador físico "hiro".         │
      │  Todo lo que pongamos dentro solo aparece cuando        │
      │  la cámara ve ese marcador.                             │
      └─────────────────────────────────────────────────────────┘
    -->
    <a-marker preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.01">

      <!--
        ┌───────────────────────────────────────────────────────┐
        │  7. MODELO 3D: astronauta glTF                        │
        │                                                       │
        │  gltf-model="#astronauta" → referencia al <a-assets> │
        │  position="0 0.5 0"      → eleva el modelo 0.5 m     │
        │                            sobre el marcador          │
        │  scale="0.5 0.5 0.5"    → tamaño moderado            │
        │  animation:              → animación de rotación      │
        │    - property: rotation  → qué propiedad animar       │
        │    - to: "0 360 0"       → girar 360° en el eje Y     │
        │    - dur: 5000           → una vuelta cada 5 segundos │
        │    - easing: linear      → velocidad constante        │
        │    - loop: true          → repite para siempre        │
        └───────────────────────────────────────────────────────┘
      -->
      <a-entity
        gltf-model="#astronauta"
        position="0 0.5 0"
        scale="0.5 0.5 0.5"
        animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true;"
      ></a-entity>

      <!--
        Halo de luz ambiental suave bajo el astronauta
        para que no flote "en seco" sobre el marcador.
      -->
      <a-entity
        light="type: point; color: #7dd3fc; intensity: 1.2; distance: 1.5;"
        position="0 0.2 0"
      ></a-entity>

    </a-marker>

  </a-scene>


  <!-- ────────────────────────────────────────────────
       8. SCRIPT: cierre del HUD
  ──────────────────────────────────────────────────── -->
  <script>
    document.getElementById('btn-cerrar').addEventListener('click', function () {
      document.getElementById('hud').classList.add('oculto');
      this.style.display = 'none';
    });
  </script>

</body>
</html>
