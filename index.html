<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dinosaurio AR – Marcador Hiro</title>

  <!-- A-Frame 1.4.2 + AR.js estables y compatibles entre sí -->
  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@v1.4.2/dist/aframe-master.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      overflow: hidden;
    }

    /* ── Panel instrucciones ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      pointer-events: none;
    }
    #panel {
      margin: 10px auto;
      max-width: 340px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(100,220,100,0.35);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: all;
    }
    .ico { font-size: 26px; flex-shrink: 0; }
    .txt { color: #d4ffd4; font-size: 12.5px; line-height: 1.5; }
    .txt strong { color: #7dff7d; display: block; font-size: 13.5px; margin-bottom: 2px; }

    #btn-x {
      position: fixed;
      top: 10px; right: 12px;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(100,220,100,0.4);
      border-radius: 50%;
      color: #7dff7d;
      width: 32px; height: 32px;
      font-size: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    #badge {
      position: fixed;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      pointer-events: none;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(100,220,100,0.25);
      border-radius: 30px;
      padding: 7px 18px;
      color: #7dff7d;
      font-size: 11.5px;
      letter-spacing: 0.05em;
    }

    #hud.oculto { display: none; }
  </style>
</head>
<body>

  <!-- HUD -->
  <div id="hud">
    <div id="panel">
      <span class="ico">🦕</span>
      <div class="txt">
        <strong>Dinosaurio AR · Marcador Hiro</strong>
        Apunta la cámara al marcador <em>Hiro</em> y el dino verde aparecerá encima girando.
      </div>
    </div>
  </div>
  <button id="btn-x" title="Cerrar">✕</button>
  <div id="badge">🎯 Marcador: HIRO</div>

  <!--
    ESCENA AR
    - arjs: usa webcam, sin UI de debug
    - vr-mode-ui desactivado (no necesitamos botón VR)
    - renderer logarithmicDepthBuffer evita z-fighting / parpadeo
    - embedded: la escena vive dentro del body normal
  -->
  <a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    embedded
  >

    <!--
      MARCADOR HIRO
      smooth/smoothCount/smoothTolerance: reduce el temblor del modelo
      en dispositivos móviles.
    -->
    <a-marker preset="hiro" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">

      <!--
        DINOSAURIO construido con primitivas A-Frame (sin modelo externo).
        Cada parte es una <a-entity> con geometría + material verde.
        Todo el dino está dentro de un grupo padre que gira.

        Paleta verde:
          cuerpo/cabeza  #2d8c2d  (verde oscuro)
          barriga        #5abf5a  (verde claro)
          ojos           #fff
          pupilas        #111
          uñas           #1a5c1a
      -->

      <!-- GRUPO PADRE: gira 360° cada 6 s -->
      <a-entity
        id="dino"
        position="0 0 0"
        animation="property: rotation; from: 0 0 0; to: 0 360 0; dur: 6000; easing: linear; loop: true;"
      >

        <!-- ── CUERPO (elipsoide aplanado) ── -->
        <a-entity
          geometry="primitive: sphere; radius: 0.28; segmentsWidth: 16; segmentsHeight: 12;"
          material="color: #2d8c2d; roughness: 0.8;"
          scale="1 0.7 1.3"
          position="0 0.28 0"
        ></a-entity>

        <!-- barriga más clara -->
        <a-entity
          geometry="primitive: sphere; radius: 0.18; segmentsWidth: 12; segmentsHeight: 10;"
          material="color: #5abf5a; roughness: 0.9;"
          scale="0.8 0.65 0.9"
          position="0 0.25 0.12"
        ></a-entity>

        <!-- ── CUELLO ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.09; height: 0.22;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0 0.48 0.14"
          rotation="-25 0 0"
        ></a-entity>

        <!-- ── CABEZA ── -->
        <a-entity
          geometry="primitive: sphere; radius: 0.14; segmentsWidth: 14; segmentsHeight: 10;"
          material="color: #2d8c2d; roughness: 0.8;"
          scale="1.2 0.95 1.3"
          position="0 0.64 0.24"
        ></a-entity>

        <!-- hocico -->
        <a-entity
          geometry="primitive: box; width: 0.18; height: 0.08; depth: 0.18;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0 0.60 0.37"
          rotation="5 0 0"
        ></a-entity>

        <!-- fosa nasal izq -->
        <a-entity
          geometry="primitive: sphere; radius: 0.025;"
          material="color: #1a5c1a;"
          position="-0.045 0.625 0.47"
        ></a-entity>
        <!-- fosa nasal der -->
        <a-entity
          geometry="primitive: sphere; radius: 0.025;"
          material="color: #1a5c1a;"
          position="0.045 0.625 0.47"
        ></a-entity>

        <!-- ojo izquierdo blanco -->
        <a-entity
          geometry="primitive: sphere; radius: 0.045;"
          material="color: #ffffff;"
          position="-0.09 0.67 0.33"
        ></a-entity>
        <!-- pupila izquierda -->
        <a-entity
          geometry="primitive: sphere; radius: 0.022;"
          material="color: #111111;"
          position="-0.095 0.672 0.368"
        ></a-entity>

        <!-- ojo derecho blanco -->
        <a-entity
          geometry="primitive: sphere; radius: 0.045;"
          material="color: #ffffff;"
          position="0.09 0.67 0.33"
        ></a-entity>
        <!-- pupila derecha -->
        <a-entity
          geometry="primitive: sphere; radius: 0.022;"
          material="color: #111111;"
          position="0.095 0.672 0.368"
        ></a-entity>

        <!-- ── COLA ── -->
        <a-entity
          geometry="primitive: cone; radiusBottom: 0.12; radiusTop: 0.02; height: 0.45;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0 0.30 -0.32"
          rotation="70 0 0"
        ></a-entity>

        <!-- ── PATA DELANTERA IZQ ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.055; height: 0.22;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="-0.21 0.16 0.06"
          rotation="10 0 15"
        ></a-entity>
        <!-- pie del izq -->
        <a-entity
          geometry="primitive: box; width: 0.1; height: 0.05; depth: 0.14;"
          material="color: #236e23; roughness: 0.8;"
          position="-0.24 0.055 0.10"
        ></a-entity>

        <!-- ── PATA DELANTERA DER ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.055; height: 0.22;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0.21 0.16 0.06"
          rotation="10 0 -15"
        ></a-entity>
        <!-- pie der -->
        <a-entity
          geometry="primitive: box; width: 0.1; height: 0.05; depth: 0.14;"
          material="color: #236e23; roughness: 0.8;"
          position="0.24 0.055 0.10"
        ></a-entity>

        <!-- ── PATA TRASERA IZQ ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.07; height: 0.28;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="-0.18 0.12 -0.15"
          rotation="5 0 8"
        ></a-entity>
        <a-entity
          geometry="primitive: box; width: 0.12; height: 0.05; depth: 0.16;"
          material="color: #236e23; roughness: 0.8;"
          position="-0.19 0.02 -0.10"
        ></a-entity>

        <!-- ── PATA TRASERA DER ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.07; height: 0.28;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0.18 0.12 -0.15"
          rotation="5 0 -8"
        ></a-entity>
        <a-entity
          geometry="primitive: box; width: 0.12; height: 0.05; depth: 0.16;"
          material="color: #236e23; roughness: 0.8;"
          position="0.19 0.02 -0.10"
        ></a-entity>

        <!-- ── BRAZO IZQUIERDO (pequeño, T-Rex style) ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.035; height: 0.14;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="-0.24 0.38 0.12"
          rotation="40 0 60"
        ></a-entity>

        <!-- ── BRAZO DERECHO ── -->
        <a-entity
          geometry="primitive: cylinder; radius: 0.035; height: 0.14;"
          material="color: #2d8c2d; roughness: 0.8;"
          position="0.24 0.38 0.12"
          rotation="40 0 -60"
        ></a-entity>

        <!-- ── PÚAS DORSALES ── -->
        <a-entity geometry="primitive: cone; radiusBottom:0.035; radiusTop:0.004; height:0.12;"
          material="color:#1a5c1a;" position="0 0.55 0.04" rotation="0 0 0"></a-entity>
        <a-entity geometry="primitive: cone; radiusBottom:0.03; radiusTop:0.004; height:0.10;"
          material="color:#1a5c1a;" position="0.04 0.53 -0.04" rotation="0 10 5"></a-entity>
        <a-entity geometry="primitive: cone; radiusBottom:0.03; radiusTop:0.004; height:0.10;"
          material="color:#1a5c1a;" position="-0.04 0.53 -0.04" rotation="0 -10 -5"></a-entity>
        <a-entity geometry="primitive: cone; radiusBottom:0.025; radiusTop:0.003; height:0.09;"
          material="color:#1a5c1a;" position="0 0.50 -0.12" rotation="8 0 0"></a-entity>
        <a-entity geometry="primitive: cone; radiusBottom:0.02; radiusTop:0.003; height:0.07;"
          material="color:#1a5c1a;" position="0 0.44 -0.22" rotation="15 0 0"></a-entity>

        <!-- ── LUZ puntual verde suave ── -->
        <a-entity
          light="type: point; color: #88ff88; intensity: 0.8; distance: 1.2;"
          position="0 0.8 0.3"
        ></a-entity>

      </a-entity>
      <!-- fin grupo dino -->

    </a-marker>

    <!-- Cámara controlada por AR.js -->
    <a-entity camera></a-entity>

  </a-scene>

  <script>
    document.getElementById('btn-x').addEventListener('click', function () {
      document.getElementById('hud').classList.add('oculto');
      this.style.display = 'none';
    });
  </script>

</body>
</html>
